<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Photo Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Photo Calendar</h1>
    <h2>2025년 4월</h2>
    <img src="천지창조.png" width="100%" alt="천지창조 명화">

    <table border="1" width="100%">
        <thead>
            <tr>
                <th width="14%" style="color:red">Sun</th>
                <th width="14%">Mon</th>
                <th width="14%">Tue</th>
                <th width="14%">Wed</th>
                <th width="14%">Thu</th>
                <th width="14%">Fri</th>
                <th width="14%" style="color:blue">Sat</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="color:red"></td>
                <td align="center"></td>
                <td align="center">1</td>
                <td align="center">2</td>
                <td align="center">3</td>
                <td align="center">4</td>
                <td align="center" style="color:blue">5</td>
            </tr>
            <tr>
                <td style="color:red">6</td>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
                <td>11</td>
                <td style="color:blue">12</td>
            </tr>
            <tr>
                <td style="color:red">13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
                <td>18</td>
                <td style="color:blue">19</td>
            </tr>
            <tr>
                <td style="color:red">20</td>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
                <td>25</td>
                <td style="color:blue">26</td>
            </tr>
            <tr>
                <td style="color:red">27</td>
                <td>28</td>
                <td>29</td>
                <td>30</td>
                <td></td>
                <td></td>
                <td style="color:blue"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
